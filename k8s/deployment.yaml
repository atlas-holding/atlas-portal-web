apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-portal-web
  namespace: atlas-portal-web-dev
  labels:
    app: atlas-portal-web
    dxp.io/managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-portal-web
  template:
    metadata:
      labels:
        app: atlas-portal-web
        backstage.io/kubernetes-id: atlas-portal-web
    spec:
      nodeSelector:
        role: workload
      tolerations:
      - key: role
        operator: Equal
        value: workload
        effect: NoSchedule
      containers:
      - name: atlas-portal-web
        image: harbor.harbor.svc.cluster.local/dxp/atlas-portal-web:b243897
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-portal-web
  namespace: atlas-portal-web-dev
spec:
  selector:
    app: atlas-portal-web
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP